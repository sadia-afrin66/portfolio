<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SADIA AFRIN | Finance & Digital Expert</title>
    <style>
        /* ১. প্রিমিয়াম মডার্ন সেটআপ */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f0f8ff 0%, #d1e9ff 100%);
            color: #102a43;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ২. নেভিগেশন বার */
        nav {
            background: #102a43;
            padding: 15px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .nav-logo { display: flex; align-items: center; gap: 12px; text-decoration: none; color: white; }
        .nav-logo img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 2px solid #00d4ff; }
        .nav-logo span { font-weight: bold; font-size: 1.2rem; letter-spacing: 1px; }

        .nav-links a {
            color: #e0e0e0;
            text-decoration: none;
            margin-left: 25px;
            font-weight: 600;
            font-size: 14px;
            transition: 0.3s;
        }
        .nav-links a:hover { color: #00d4ff; }

        /* ৩. হিরো সেকশন - যেখানে সব ফোকাস থাকবে */
        .welcome-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 50px 20px;
        }

        /* ছবি অনেক বড় এবং আকর্ষণীয় করা (৪০০ পিক্সেল) */
        .main-img {
            width: 400px;
            height: 400px;
            border-radius: 50%;
            border: 15px solid white; /* আরও মোটা বর্ডার */
            object-fit: cover;
            box-shadow: 0 30px 60px rgba(0,0,0,0.2);
            margin-bottom: 40px;
            animation: popIn 1.5s ease;
        }

        /* বড় এবং আকর্ষণীয় টাইটেল */
        .hero-text h1 {
            font-size: 5rem;
            font-weight: 900;
            line-height: 1;
            color: #102a43;
            margin-bottom: 20px;
            letter-spacing: -2px;
        }

        .hero-text h1 span {
            color: #0091ea;
        }

        .hero-text p {
            font-size: 1.5rem;
            color: #486581;
            margin-bottom: 50px;
            max-width: 800px;
            font-weight: 500;
        }

        /* ৪. স্টাইলিশ বাটন */
        .cta-buttons {
            display: flex;
            gap: 25px;
        }
        .btn {
            padding: 20px 45px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            transition: 0.4s;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .btn-work { background: #102a43; color: white; }
        .btn-work:hover { background: #0091ea; transform: translateY(-7px); }
        
        .btn-contact { border: 3px solid #102a43; color: #102a43; }
        .btn-contact:hover { background: #102a43; color: white; transform: translateY(-7px); }

        /* ৫. এনিমেশন কীফ্রেম */
        @keyframes popIn {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        /* ফুটার থেকে আপনার অনুরোধ মতো লেখা বাদ দেওয়া হয়েছে */
        footer { padding: 40px; text-align: center; color: #627d98; font-weight: bold; font-size: 1rem; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="nav-logo">
            <img src="my-photo.jpg" alt="Sadia">
            <span>SADIA AFRIN</span>
        </a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="about.html">About Me</a>
            <a href="services.html">Services</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>

    <div class="welcome-container">
        <img src="my-photo.jpg.jpg" alt="Sadia Afrin" class="main-img">

        <div class="hero-text">
            <h1>I'm <span>Sadia Afrin</span></h1>
            <p>Finance Specialist & Digital Strategist delivering impactful solutions.</p>
        </div>
        
        <div class="cta-buttons">
            <a href="services.html" class="btn btn-work">My Services</a>
            <a href="contact.html" class="btn btn-contact">Hire Me</a>
        </div>
    </div>

    <footer>
        &copy; 2026 SADIA AFRIN | Khulna, Bangladesh
    </footer>

</body>
</html>
